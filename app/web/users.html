<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management - WorkflowBuilder</title>
  <link rel="stylesheet" href="/ui/static/styles.css">
</head>
<body>
  <div data-app-navbar data-navbar-title="User Management"></div>

  <main class="tab-content users-page">
    <section class="card premium-card">
      <div class="section-title-row">
        <div>
          <h2>Users</h2>
          <p class="hint">Create accounts, update user details, and reset passwords.</p>
        </div>
        <button id="refresh-users" class="btn-secondary" type="button">Refresh</button>
      </div>
      <div id="users-alert" class="json-status muted">Loading users...</div>
      <div id="users-list" class="users-list"></div>
    </section>

    <section class="card premium-card">
      <div class="section-title-row">
        <div>
          <h2>Role Management</h2>
          <p class="hint">Assign multiple roles. Effective permissions are combined automatically.</p>
        </div>
      </div>
      <form id="role-management-form" class="user-form">
        <label>User
          <select id="role-user-select" required></select>
        </label>
        <fieldset class="role-options">
          <legend>Roles</legend>
          <div id="role-options-list" class="role-options-list"></div>
        </fieldset>
        <div>
          <span class="field-label">Effective permissions</span>
          <div id="effective-permissions" class="permission-list muted">Select a user.</div>
        </div>
        <button class="btn-primary" type="submit">Save role assignments</button>
      </form>
    </section>

    <section class="card premium-card">
      <h2>Create User</h2>
      <form id="create-user-form" class="user-form">
        <label>Username
          <input id="create-username" required minlength="3">
        </label>
        <label>Email (optional)
          <input id="create-email" type="email">
        </label>
        <label>Display name
          <input id="create-name" required>
        </label>
        <label>Status
          <select id="create-status">
            <option value="active">active</option>
            <option value="inactive">inactive</option>
          </select>
        </label>
        <label>Password
          <input id="create-password" type="password" autocomplete="new-password" required>
        </label>
        <button class="btn-primary" type="submit">Create user</button>
      </form>
    </section>
  </main>
  <script src="/ui/static/navbar.js"></script>
  <script src="/ui/static/users.js?v=rbac-20260717-3"></script>
</body>
</html>
